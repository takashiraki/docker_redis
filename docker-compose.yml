services:
  redis:
    image: redis:latest
    container_name: my_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - my_infra_network

volumes:
  redis_data:


networks:
  my_infra_network:
    external: true
    name: my_infra_network
